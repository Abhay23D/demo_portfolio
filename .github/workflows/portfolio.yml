name: Portfolio

on:
    push:
        branches: [main]

permissions: 
    pages: write
    id-token: write

jobs:
    deploy:
        runs-on: ubuntu-latest

        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        
        steps:
            #get access to your portfolio code via a prebuilt action
            # checkouts the code in the same repository where this workflow is written
            - name: checkout code
              uses: actions/checkout@v4

            # setup github pages
            - name: setup github pages
              uses: actions/configure-pages@v4
            

            # static code artifacts
            - name: upload static files
              uses: actions/upload-pages-artifact@v4
              with:
                  path: "."

            # make page live
            - name: deploy to github pages
              uses: actions/deploy-pages@v4
